{% extends 'recruitment/base.html' %}
{% block title %}Register Company - HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="page-header">
            <h2 class="fw-bold mb-1">
                <i class="fas fa-building me-2"></i>Register Your Company
            </h2>
            <p class="mb-0 opacity-75">
                Create your company account to start hiring smarter
            </p>
        </div>
        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <h5 class="fw-bold mb-3 text-primary">
                    <i class="fas fa-building me-2"></i>Company Information
                </h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Company Name *</label>
                        <input type="text" name="company_name" class="form-control"
                               placeholder="e.g. TechCorp Solutions" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Industry *</label>
                        <select name="industry" class="form-select" required>
                            <option value="">Select industry</option>
                            <option value="IT">Information Technology</option>
                            <option value="Finance">Finance & Banking</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Manufacturing">Manufacturing</option>
                            <option value="Retail">Retail</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Company Size *</label>
                        <select name="company_size" class="form-select" required>
                            <option value="">Select size</option>
                            <option value="1-10">1-10 employees</option>
                            <option value="11-50">11-50 employees</option>
                            <option value="51-200">51-200 employees</option>
                            <option value="201-500">201-500 employees</option>
                            <option value="500+">500+ employees</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Company Website</label>
                        <input type="url" name="website" class="form-control"
                               placeholder="https://yourcompany.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Company Description</label>
                        <textarea name="description" class="form-control" rows="2"
                                  placeholder="Brief description of your company..."></textarea>
                    </div>
                </div>
                <h5 class="fw-bold mb-3 text-primary">
                    <i class="fas fa-user-tie me-2"></i>HR Details
                </h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Your Full Name *</label>
                        <input type="text" name="hr_name" class="form-control"
                               placeholder="Your full name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Your Phone Number *</label>
                        <input type="text" name="hr_phone" class="form-control"
                               placeholder="+91 9999999999" required>
                    </div>
                </div>
                <h5 class="fw-bold mb-3 text-primary">
                    <i class="fas fa-lock me-2"></i>Account Credentials
                </h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Username *</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="Choose a username" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email *</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="official@company.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password *</label>
                        <input type="password" name="password1" class="form-control"
                               placeholder="Create password" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Confirm Password *</label>
                        <input type="password" name="password2" class="form-control"
                               placeholder="Confirm password" required>
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary-custom px-5">
                        <i class="fas fa-building me-2"></i>Register Company
                    </button>
                    <a href="{% url 'landing' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
