{% extends 'recruitment/base.html' %}
{% block title %}Edit Job - HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="page-header">
            <h2 class="fw-bold mb-1">
                <i class="fas fa-edit me-2"></i>Edit Job
            </h2>
            <p class="mb-0 opacity-75">Update the job posting details</p>
        </div>
        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-semibold">Job Title *</label>
                    <input type="text" name="title" class="form-control form-control-lg"
                           value="{{ form.instance.title }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Job Description *</label>
                    <textarea name="description" class="form-control" rows="5"
                              required>{{ form.instance.description }}</textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Required Skills *</label>
                    <input type="text" name="required_skills" class="form-control"
                           value="{{ form.instance.required_skills }}" required>
                    <small class="text-muted">Comma separated skills</small>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Experience Required *</label>
                        <select name="experience_required" class="form-select" required>
                            <option value="0-1" {% if form.instance.experience_required == '0-1' %}selected{% endif %}>0-1 years</option>
                            <option value="1-3" {% if form.instance.experience_required == '1-3' %}selected{% endif %}>1-3 years</option>
                            <option value="3-5" {% if form.instance.experience_required == '3-5' %}selected{% endif %}>3-5 years</option>
                            <option value="5+" {% if form.instance.experience_required == '5+' %}selected{% endif %}>5+ years</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Education Required *</label>
                        <input type="text" name="education_required" class="form-control"
                               value="{{ form.instance.education_required }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Location</label>
                        <input type="text" name="location" class="form-control"
                               value="{{ form.instance.location }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Salary Range</label>
                        <input type="text" name="salary_range" class="form-control"
                               value="{{ form.instance.salary_range }}"
                               placeholder="e.g. 5-8 LPA">
                    </div>
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary-custom px-5">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                    <a href="{% url 'job_detail' job.id %}"
                       class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
