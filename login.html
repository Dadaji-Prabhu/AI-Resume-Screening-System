{% extends 'recruitment/base.html' %}
{% block title %}Login - HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="page-header text-center">
            <h2 class="fw-bold mb-1">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </h2>
            <p class="mb-0 opacity-75">Welcome back to HireIQ</p>
        </div>
        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-user me-2 text-primary"></i>Username
                    </label>
                    <input type="text" name="username" class="form-control form-control-lg"
                           placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="fas fa-lock me-2 text-primary"></i>Password
                    </label>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="Enter password" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary-custom btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </div>
                <div class="text-center mt-3">
                    <a href="{% url 'forgot_password' %}"
                        class="text-muted small">
                    <i class="fas fa-key me-1"></i>
                        Forgot Password?
                    </a>
                </div>
            </form>
            <hr>
            <div class="text-center">
                <p class="text-muted mb-2">Don't have an account?</p>
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'hr_register' %}" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-building me-1"></i>Register as HR
                    </a>
                    <a href="{% url 'candidate_register' %}" class="btn btn-outline-success btn-sm">
                        <i class="fas fa-user me-1"></i>Register as Candidate
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
