{% extends 'recruitment/base.html' %}
{% block title %}Reset Password OTP — HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <div style="font-size:3rem;">📧</div>
            <h3 class="fw-bold mt-2">Check Your Email</h3>
            <p class="text-muted">
                We sent a 6-digit OTP to
                <strong>{{ email }}</strong>
            </p>
        </div>

        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-semibold text-center d-block">
                        Enter OTP
                    </label>
                    <input type="text"
                           name="otp"
                           class="form-control form-control-lg text-center"
                           style="letter-spacing:8px;
                                  font-size:1.5rem;
                                  font-weight:700;"
                           maxlength="6"
                           placeholder="000000"
                           autofocus required>
                    <small class="text-muted d-block text-center mt-1">
                        Valid for 5 minutes
                    </small>
                </div>

                <button type="submit"
                        class="btn btn-primary-custom w-100 btn-lg mb-3">
                    <i class="fas fa-check me-2"></i>
                    Verify OTP
                </button>

                <div class="text-center">
                    <button type="submit"
                            name="action"
                            value="resend"
                            class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-redo me-1"></i>
                        Resend OTP
                    </button>
                    <a href="{% url 'forgot_password' %}"
                       class="btn btn-outline-secondary btn-sm ms-2">
                        <i class="fas fa-edit me-1"></i>
                        Change Email
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
