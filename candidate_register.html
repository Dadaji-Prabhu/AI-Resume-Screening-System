{% extends 'recruitment/base.html' %}
{% block title %}Register as Candidate - HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="page-header">
            <h2 class="fw-bold mb-1">
                <i class="fas fa-user-graduate me-2"></i>Register as Candidate
            </h2>
            <p class="mb-0 opacity-75">
                Create your profile and let AI match you with the best jobs
            </p>
        </div>
        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Full Name *</label>
                        <input type="text" name="full_name" class="form-control"
                               placeholder="Your full name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone Number *</label>
                        <input type="text" name="phone" class="form-control"
                               placeholder="+91 9999999999" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email *</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="your@email.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">LinkedIn Profile URL</label>
                        <input type="url" name="linkedin_url" class="form-control"
                               placeholder="https://linkedin.com/in/yourprofile">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">GitHub URL</label>
                        <input type="url" name="github_url" class="form-control"
                               placeholder="https://github.com/yourusername">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Username *</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="Choose a username" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password *</label>
                        <input type="password" name="password1" class="form-control"
                               placeholder="Create password" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Confirm Password *</label>
                        <input type="password" name="password2" class="form-control"
                               placeholder="Confirm password" required>
                    </div>
                </div>
                <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" name="whatsapp_consent"
                           class="form-check-input" id="whatsappConsent">
                    <label class="form-check-label" for="whatsappConsent">
                        <i class="fab fa-whatsapp me-1" style="color:#25D366;"></i>
                        I agree to receive WhatsApp notifications about
                        my application status
                    </label>
                </div>
            </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-success px-5">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                    <a href="{% url 'landing' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
