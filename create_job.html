{% extends 'recruitment/base.html' %}
{% block title %}Post Job - HireIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="page-header">
            <h2 class="fw-bold mb-1">
                <i class="fas fa-plus-circle me-2"></i>
                Post New Job
            </h2>
            <p class="mb-0 opacity-75">
                Fill in the details to create a new job opening
            </p>
        </div>
        <div class="card-custom p-4">
            <form method="POST">
                {% csrf_token %}

                <h6 class="fw-bold text-primary mb-3">
                    <i class="fas fa-briefcase me-2"></i>
                    Basic Information
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Job Title *
                        </label>
                        <input type="text" name="title"
                               class="form-control form-control-lg"
                               placeholder="e.g. Senior Python Developer"
                               required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Job Type *
                        </label>
                        <select name="job_type" class="form-select">
                            <option value="full_time">Full Time</option>
                            <option value="part_time">Part Time</option>
                            <option value="remote">Remote</option>
                            <option value="hybrid">Hybrid</option>
                            <option value="internship">Internship</option>
                            <option value="contract">Contract</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Number of Openings
                        </label>
                        <input type="number" name="openings"
                               class="form-control"
                               value="1" min="1">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Job Description *
                        </label>
                        <textarea name="description"
                                  class="form-control" rows="5"
                                  placeholder="Describe the role, responsibilities and requirements..."
                                  required></textarea>
                    </div>
                </div>

                <h6 class="fw-bold text-primary mb-3">
                    <i class="fas fa-tools me-2"></i>
                    Requirements
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">
                            Required Skills *
                        </label>
                        <input type="text" name="required_skills"
                               class="form-control"
                               placeholder="python, django, machine learning, sql"
                               required>
                        <small class="text-muted">
                            Comma separated skills
                        </small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Experience Required *
</label>
                        <select name="experience_required"
                                class="form-select" required>
                            <option value="">Select level</option>
                            <option value="0-1">0-1 years</option>
                            <option value="1-3">1-3 years</option>
                            <option value="3-5">3-5 years</option>
                            <option value="5+">5+ years</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Education Required *
                        </label>
                        <input type="text" name="education_required"
                               class="form-control"
                               placeholder="e.g. Bachelor's in Computer Science"
                               required>
                    </div>
                </div>

                <h6 class="fw-bold text-primary mb-3">
                    <i class="fas fa-map-marker-alt me-2"></i>
                    Additional Details
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Location
                        </label>
                        <input type="text" name="location"
                               class="form-control"
                               placeholder="e.g. Bangalore, Karnataka">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Salary Range
                        </label>
                        <input type="text" name="salary_range"
                               class="form-control"
                               placeholder="e.g. 5-8 LPA">
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit"
                            class="btn btn-primary-custom px-5">
                        <i class="fas fa-save me-2"></i>Post Job
                    </button>
                    <a href="{% url 'job_list' %}"
                       class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
